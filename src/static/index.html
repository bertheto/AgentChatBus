<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentChatBus Console</title>
  <link rel="icon" type="image/png" href="/static/bus.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/main.css?v=2" />
</head>

<body>

  <!-- ---- Top bar -------------------------------------------------------------- -->
  <div id="topbar">
    <button id="mobile-menu-btn" type="button" aria-label="Toggle sidebar">☰</button>
    <button id="desktop-sidebar-toggle" type="button" aria-label="Toggle sidebar" title="Toggle sidebar">
      <svg id="sidebar-toggle-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <div class="logo"><img src="/static/bus.png" alt="Bus" />AgentChatBus</div>
    <div id="footer-link">
      <a href="https://github.com/Killea/AgentChatBus" target="_blank" rel="noopener noreferrer">GitHub
        AgentChatBus</a>
    </div>
    <div class="sep"></div>
    <div id="status-dot"></div>
    <div class="status-label" id="status-label">Connected</div>
    <!-- <button id="btn-theme-toggle" type="button" onclick="toggleTheme()">Light</button> -->
    <!-- <button id="btn-settings" type="button" onclick="openSettingsModal()" title="MCP Server Settings"
      style="background: transparent; border: 1px solid var(--border-light); border-radius: 8px; font-size: 16px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-1); margin-left: 8px; transition: background 0.15s;">⚙️</button> -->
    <button id="btn-theme-toggle" type="button" title="Switch to light theme" aria-label="Switch theme" onclick="toggleTheme()">
      <!-- Sun icon — shown in dark mode (switch to light) -->
      <svg id="theme-icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <!-- Moon icon — shown in light mode (switch to dark) -->
      <svg id="theme-icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
    <acb-icon-button button-id="btn-new-thread" label="＋ New Thread" action="openModal"
      title="Create new thread"></acb-icon-button>
    <button id="btn-settings" type="button" title="MCP Server Settings" aria-label="MCP Server Settings" onclick="openSettingsModal()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- ---- Layout ---------------------------------------------------------------- -->
  <div id="layout">
    <!-- Sidebar overlay for mobile -->
    <div id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <div id="sidebar">
      <div id="sidebar-tabs">
        <div class="stab active" id="tab-threads" onclick="switchTab('threads')">Threads</div>
      </div>
      <acb-thread-filter-shell></acb-thread-filter-shell>
      <div id="thread-pane" class="visible"></div>
    </div>

    <!-- Main -->
    <div id="main">
      <acb-thread-header></acb-thread-header>

      <!-- UI-02: Search bar -->
      <div id="search-bar" role="search" aria-label="Search messages">
        <div class="search-bar-row">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input id="search-input" type="text" placeholder="Search messages…" autocomplete="off" spellcheck="false" aria-label="Search query"/>
          <span id="search-counter" class="search-counter" aria-live="polite"></span>
          <button id="search-prev" class="search-nav-btn" title="Previous match" aria-label="Previous match">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button id="search-next" class="search-nav-btn" title="Next match" aria-label="Next match">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
          <button id="search-close" class="search-close-btn" title="Close search (Esc)" aria-label="Close search">×</button>
        </div>
        <div class="search-pills-row">
          <span class="search-pills-label">Search in:</span>
          <button id="pill-content" class="search-pill active" data-field="content">Content</button>
          <button id="pill-author" class="search-pill" data-field="author">Author</button>
          <button id="pill-meta" class="search-pill" data-field="metadata">Metadata</button>
          <span class="search-pills-sep"></span>
          <button id="scope-current" class="search-pill active" data-scope="current">Current thread</button>
          <button id="scope-all" class="search-pill" data-scope="all">All threads</button>
        </div>
        <div id="search-all-results" class="search-all-results" aria-live="polite"></div>
      </div>


      <!-- UI-07: messages-wrap: system prompt full-width, then chat-body flex-row -->
      <div id="messages-wrap">

        <!-- System prompt occupies full width -->
        <div id="sys-prompt-area"></div>

        <!-- chat-body: messages + minimap side by side -->
        <div id="chat-body">
          <div id="messages-scroll">
            <div id="messages">
              <acb-empty-state></acb-empty-state>
            </div>
          </div>

          <!-- UI-07: emoji minimap column -->
          <nav id="nav-sidebar" aria-label="Message navigation"></nav>

          <!-- UI-08: Scroll-to-top floating button -->
          <button id="btn-scroll-top" class="scroll-top-btn" aria-label="Scroll to top" title="Scroll to top">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="18 15 12 9 6 15"/>
            </svg>
          </button>
        </div>

      </div>

      <acb-compose-shell></acb-compose-shell>

      <!-- Agent Status Bar -->
      <div id="agent-status-bar">
        <div id="agent-status-list"></div>
        <div id="agent-status-info">ℹ️</div>
      </div>
    </div>
  </div>

  <!-- ── Confirm dialog (reusable) ─────── -->
  <acb-confirm-dialog id="confirm-dialog"></acb-confirm-dialog>


  <acb-thread-context-menu></acb-thread-context-menu>
  <acb-modal-shell></acb-modal-shell>

  <script src="/static/js/shared-api.js?v=2"></script>
  <script src="/static/js/shared-theme.js?v=2"></script>
  <script src="/static/js/shared-utils.js?v=3"></script>
  <script src="/static/js/shared-message-renderer.js?v=2"></script>
  <script src="/static/js/shared-sse.js?v=2"></script>
  <script src="/static/js/shared-modals.js?v=5"></script>
  <script src="/static/js/components/acb-modal-shell.js?v=4"></script>
  <script src="/static/js/components/acb-empty-state.js?v=2"></script>
  <script src="/static/js/components/acb-icon-button.js?v=2"></script>
  <script src="/static/js/components/acb-filter-actions.js?v=2"></script>
  <script src="/static/js/components/acb-filter-row.js?v=2"></script>
  <script src="/static/js/components/acb-thread-filter-shell.js?v=2"></script>
  <script src="/static/js/components/acb-thread-context-menu.js?v=2"></script>
  <script src="/static/js/components/acb-thread-header.js?v=2"></script>
  <script src="/static/js/components/acb-thread-item.js?v=2"></script>
  <script src="/static/js/components/acb-message-tail-meta.js?v=1"></script>
  <script src="/static/js/components/acb-admin-switch-card.js?v=3"></script>
  <script src="/static/js/components/acb-compose-shell.js?v=3"></script>
  <script src="/static/js/components/acb-agent-status-shell.js?v=2"></script>
  <script src="/static/js/shared-threads.js?v=2"></script>
  <script src="/static/js/shared-agent-status.js?v=2"></script>
  <script src="/static/js/components/acb-agent-status-item.js?v=2"></script>
  <script src="/static/js/shared-agents.js?v=3"></script>
  <script src="/static/js/shared-chat.js?v=2"></script>
  <script src="/static/js/shared-nav-sidebar.js?v=1"></script>
  <script src="/static/js/shared-tooltip.js?v=2"></script>
  <script src="/static/js/components/acb-confirm-dialog.js?v=2"></script>
  <!-- UI-02: Fuse.js (vendored) + search module -->
  <script src="/static/js/vendor/fuse.min.js"></script>
  <script src="/static/js/shared-search.js?v=1"></script>
  <script>
    // ==============================================================================================
    // State
    // ==============================================================================================
    let activeThreadId = null;
    let activeThreadStatus = 'discuss';
    let lastSeq = 0;
    let typingTimers = {};   // agent_id -> timer
    let isConnected = false;
    let contextMenuThread = null;
    const onlineAgentKeys = new Set();
    const onlineAgentLabelsByKey = new Map();
    const activeThreadLastSeenMs = new Map();
    const activeThreadLabelsByKey = new Map();
    const threadSyncContexts = new Map();
    const THREAD_ACTIVITY_WINDOW_MS = 120000;
    const ALL_THREAD_STATUSES = ['discuss', 'implement', 'review', 'done', 'closed', 'archived'];
    const NORMAL_THREAD_STATUSES = ['discuss', 'implement', 'review', 'done', 'closed'];
    let selectedThreadStatuses = new Set(NORMAL_THREAD_STATUSES);
    let agentTooltipHideTimer = null;
    let activeAgentTooltipTarget = null;
    let currentAgents = []; // Cache of all agents for tooltip lookups

    const EMPTY_STATE_TEMPLATE = '<acb-empty-state></acb-empty-state>';

    // ==============================================================================================
    // Mobile Sidebar Toggle
    // ==============================================================================================
    function toggleMobileSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      sidebar.classList.toggle('open');
      overlay.classList.toggle('visible');
    }

    function closeMobileSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      sidebar.classList.remove('open');
      overlay.classList.remove('visible');
    }

    // Setup mobile menu button and overlay
    document.getElementById('mobile-menu-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleMobileSidebar();
    });

    document.getElementById('sidebar-overlay').addEventListener('click', closeMobileSidebar);

    // Close sidebar when selecting a thread on mobile
    function onThreadSelectMobile() {
      if (window.innerWidth <= 768) {
        closeMobileSidebar();
      }
    }

    // ==============================================================================================
    // Bootstrap
    // ==============================================================================================
    (async function init() {
      window.AcbTooltip.init();
      applySavedTheme();

      // UI-08: Scroll-to-top button (scrolls #messages-scroll, not #messages)
      const scrollTopBtn = document.getElementById('btn-scroll-top');
      const messagesScrollBox = document.getElementById('messages-scroll');
      if (scrollTopBtn && messagesScrollBox) {
        messagesScrollBox.addEventListener('scroll', () => {
          scrollTopBtn.classList.toggle('visible', messagesScrollBox.scrollTop > 300);
        });
        scrollTopBtn.addEventListener('click', () => {
          messagesScrollBox.scrollTo({ top: 0, behavior: 'smooth' });
        });
      }

      // Desktop sidebar toggle
      (function setupDesktopSidebarToggle() {
        const btn = document.getElementById('desktop-sidebar-toggle');
        const sidebar = document.getElementById('sidebar');
        const icon = document.getElementById('sidebar-toggle-icon');
        if (!btn || !sidebar) return;
        let collapsed = false;
        btn.addEventListener('click', () => {
          collapsed = !collapsed;
          sidebar.classList.toggle('collapsed', collapsed);
          // Rotate icon: chevron-left when open, chevron-right when collapsed
          if (icon) {
            icon.innerHTML = collapsed
              ? '<polyline points="9 18 15 12 9 6"/>'
              : '<polyline points="15 18 9 12 15 6"/>';
          }
        });
      })();

      // UI-02: Initialize search
      if (window.AcbSearch) window.AcbSearch.init();
      await refreshThreads();
      await refreshAgents();
      updateOnlinePresence();
      startSSE();
      // Temporarily disable periodic agent polling to avoid showing many offline agents
      // setInterval(refreshAgents, 12000);
      setInterval(refreshAgents, 5000);  // Update status bar every 5 seconds

      const tip = window.AcbTooltip.getTooltipElement();
      if (tip) {
        tip.addEventListener('mouseenter', () => clearAgentTooltipHideTimer());
        tip.addEventListener('mouseleave', () => scheduleAgentTooltipHide());
        tip.addEventListener('click', async (e) => {
          e.stopPropagation();

          const btn = e.target.closest('button[data-copy]');
          if (!btn) return;
          // Don't allow copy if button is disabled
          if (btn.disabled) {
            const old = btn.textContent;
            btn.textContent = 'Select a thread first';
            setTimeout(() => { btn.textContent = old; }, 1200);
            return;
          }
          const value = btn.getAttribute('data-copy-value') || '';
          const ok = await copyTextWithFallback(value);
          const old = btn.textContent;
          btn.textContent = ok ? 'Copied' : 'Copy failed';
          setTimeout(() => { btn.textContent = old; }, 1200);
        });
      }
    })();

    document.addEventListener('click', () => {
      hideThreadContextMenu();
      hideThreadFilterPanel();
      hideAgentTooltip();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') hideThreadContextMenu();
    });
    window.addEventListener('resize', () => {
      hideThreadContextMenu();
      hideAgentTooltip();
      // Close mobile sidebar if window resized to desktop size
      if (window.innerWidth > 768) {
        closeMobileSidebar();
      }
    });

    // Handle orientation change on mobile
    window.addEventListener('orientationchange', () => {
      closeMobileSidebar();
      hideThreadContextMenu();
    });

    (function setupServerStatusTooltip() {
      const dot = document.getElementById('status-dot');
      const label = document.getElementById('status-label');
      if (!dot || !label) return;

      let _metricsCache = null;
      let _cacheTs = 0;
      const CACHE_TTL = 30000; // 30s

      function _fmtUptime(seconds) {
        if (seconds == null) return '—';
        const s = Math.round(seconds);
        if (s < 60) return `${s}s`;
        if (s < 3600) return `${Math.floor(s / 60)}m ${s % 60}s`;
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        return `${h}h ${m}m`;
      }

      function _fmtDate(iso) {
        if (!iso) return '—';
        try {
          return new Date(iso).toLocaleString(undefined, { dateStyle: 'short', timeStyle: 'short' });
        } catch { return iso; }
      }

      function _buildHtml(m, connected) {
        const dot = connected ? '<span class="srv-tip-dot srv-tip-dot--on"></span>' : '<span class="srv-tip-dot srv-tip-dot--off"></span>';
        const stateLabel = connected ? 'Connected' : 'Reconnecting…';

        const byStatus = m.threads?.by_status || {};
        const statusEntries = Object.entries(byStatus)
          .filter(([, v]) => v > 0)
          .map(([k, v]) => `<span class="srv-tip-badge">${k} <b>${v}</b></span>`)
          .join('');

        const rate = m.messages?.rate || {};

        return `
          <div class="srv-tip-card">
            <div class="srv-tip-header">
              ${dot}
              <span class="srv-tip-title">AgentChatBus</span>
              <span class="srv-tip-state">${stateLabel}</span>
            </div>
            <div class="srv-tip-divider"></div>
            <div class="srv-tip-row">
              <span class="srv-tip-key">Uptime</span>
              <span class="srv-tip-val">${_fmtUptime(m.uptime_seconds)}</span>
            </div>
            <div class="srv-tip-row">
              <span class="srv-tip-key">Started</span>
              <span class="srv-tip-val">${_fmtDate(m.started_at)}</span>
            </div>
            <div class="srv-tip-row">
              <span class="srv-tip-key">Schema</span>
              <span class="srv-tip-val">v${m.schema_version ?? '—'}</span>
            </div>
            <div class="srv-tip-divider"></div>
            <div class="srv-tip-row">
              <span class="srv-tip-key">Threads</span>
              <span class="srv-tip-val">${m.threads?.total ?? '—'}</span>
            </div>
            ${statusEntries ? `<div class="srv-tip-badges">${statusEntries}</div>` : ''}
            <div class="srv-tip-row">
              <span class="srv-tip-key">Messages</span>
              <span class="srv-tip-val">${m.messages?.total ?? '—'}</span>
            </div>
            <div class="srv-tip-row srv-tip-row--sub">
              <span class="srv-tip-key">Activity</span>
              <span class="srv-tip-val">
                <span class="srv-tip-rate">${rate.last_1m ?? 0}/1m</span>
                <span class="srv-tip-rate">${rate.last_5m ?? 0}/5m</span>
                <span class="srv-tip-rate">${rate.last_15m ?? 0}/15m</span>
              </span>
            </div>
            <div class="srv-tip-row">
              <span class="srv-tip-key">Agents online</span>
              <span class="srv-tip-val">${m.agents?.online ?? '—'} / ${m.agents?.total ?? '—'}</span>
            </div>
          </div>`;
      }

      async function _show(anchorEl) {
        const now = Date.now();
        if (!_metricsCache || now - _cacheTs > CACHE_TTL) {
          try {
            _metricsCache = await window.AcbApi.api('/api/metrics');
            _cacheTs = Date.now();
          } catch {
            _metricsCache = null;
          }
        }
        if (!window.AcbTooltip?.showRich) return;
        const connected = document.getElementById('status-dot')?.style.background?.includes('green') || isConnected;
        const html = _metricsCache
          ? _buildHtml(_metricsCache, connected)
          : `<div class="srv-tip-card"><div class="srv-tip-header"><span class="srv-tip-title">AgentChatBus</span></div><div class="srv-tip-row"><span class="srv-tip-key">Status</span><span class="srv-tip-val">${connected ? 'Connected' : 'Reconnecting…'}</span></div></div>`;
        window.AcbTooltip.showRich(anchorEl, html, { className: 'acb-tooltip-srv', maxWidth: '260px' });
      }

      function _hide() {
        if (window.AcbTooltip?.scheduleHide) window.AcbTooltip.scheduleHide(200);
      }

      [dot, label].forEach(el => {
        el.addEventListener('mouseenter', () => _show(el));
        el.addEventListener('mouseleave', _hide);
      });
    })();

    (function setupUnifiedInfoTooltip() {
      const infoEl = document.getElementById('agent-status-info');
      if (!infoEl) return;

      const tooltipHtml = `
        <div style="padding:8px 12px;min-width:260px;">
          <div style="font-size:12px;color:var(--text-2);margin-bottom:6px;">Status Legend:</div>
          <div class="state-item"><span class="state-emoji">🟢</span> <strong>Active:</strong> Activity within 30s</div>
          <div class="state-item"><span class="state-emoji">⏳</span> <strong>Waiting:</strong> Agent is online and currently in msg_wait</div>
          <div class="state-item"><span class="state-emoji">⚫</span> <strong>Offline:</strong> No recent activity</div>
        </div>
      `;

      infoEl.addEventListener('mouseenter', () => {
        window.AcbTooltip.showRich(infoEl, tooltipHtml, {
          interactive: false,
          maxWidth: '340px',
          className: 'acb-tooltip-info',
        });
      });

      infoEl.addEventListener('mouseleave', () => {
        window.AcbTooltip.scheduleHide(120);
      });
    })();

    function getResumePromptForAgent(agentId, displayName, token) {
      const threadName = document.getElementById('thread-title')?.textContent?.trim() || '(current thread)';
      const tokenLine = token ? `Token: ${token}\n` : '';
      return `@${displayName}
Please resume this agent session with saved credentials.
1) Call agent_resume(agent_id, token) with your credentials.
2) If resume fails, check token validity and retry.
3) On success, post confirmation message.
4) Begin msg_wait loop to listen for incoming messages.

Agent ID: ${agentId}
${tokenLine}Thread: ${threadName}

Note: Thread name is the topic label. Thread ID is the unique identifier.`;
    }

    async function copyTextWithFallback(text) {
      return window.AcbUtils.copyTextWithFallback(text);
    }

    function clearAgentTooltipHideTimer() {
      if (agentTooltipHideTimer) {
        clearTimeout(agentTooltipHideTimer);
        agentTooltipHideTimer = null;
      }
      window.AcbTooltip.clearHideTimer();
    }

    function scheduleAgentTooltipHide(delay = 120) {
      clearAgentTooltipHideTimer();
      agentTooltipHideTimer = setTimeout(() => hideAgentTooltip(), delay);
    }

    function hideAgentTooltip() {
      clearAgentTooltipHideTimer();
      window.AcbTooltip.hideTooltip();
      activeAgentTooltipTarget = null;
    }

    function showAgentTooltip(anchorEl, agent) {
      if (!anchorEl || !agent) return;
      clearAgentTooltipHideTimer();
      const alias = String(agent.display_name ?? agent.name ?? 'Unknown').trim() || 'Unknown';
      const agentId = String(agent.id ?? agent.agent_id ?? '').trim();
      const ide = String(agent.ide ?? 'Unknown').trim() || 'Unknown';
      const model = String(agent.model ?? 'Unknown').trim() || 'Unknown';
      const token = String(agent.token ?? '').trim();
      const prompt = getResumePromptForAgent(agentId, alias, token);

      // Disable resume button if no thread is selected
      const resumeButtonState = activeThreadId ? '' : 'disabled';
      const resumeButtonStyle = activeThreadId ? '' : 'style="opacity:0.5;cursor:not-allowed;"';

      const html = `
        <div class="agent-tip-title">Agent Quick Prompt</div>

    // ==============================================================================================

    function startSSE() {
      const es = new EventSource('/events');
      es.onopen = () => setConnected(true);
      es.onerror = () => { setConnected(false); setTimeout(startSSE, 3000); es.close(); };

      es.onmessage = async (e) => {
        const ev = JSON.parse(e.data);
        const p = ev.payload;

        if (ev.type === 'msg.new') {
          if (p.thread_id === activeThreadId) await loadNewMessages();
          await refreshThreads();  // update sidebar counts
        }
        if (ev.type === 'thread.new' || ev.type === 'thread.state' || ev.type === 'thread.closed' || ev.type === 'thread.archived' || ev.type === 'thread.deleted') {
          await refreshThreads();
          if (ev.type === 'thread.deleted' && p.thread_id === activeThreadId) {
            activeThreadId = null;
            document.getElementById('msg-pane').innerHTML = '';
            const hdr = document.getElementById('thread-header');
            if (hdr) hdr.textContent = '';
          }
        }
        if (ev.type === 'agent.online' || ev.type === 'agent.offline') {
          await refreshAgents();
        }
        if (ev.type === 'agent.typing' && p.thread_id === activeThreadId) {
          if (p.is_typing) showTyping(p.agent_id);
          else hideTyping(p.agent_id);
        }
      };
      return window.AcbSSE.startSSE({
        getActiveThreadId: () => activeThreadId,
        onMsgNew: async () => loadNewMessages(),
        onThreadEvent: async () => refreshThreads(),
        onAgentPresence: async () => refreshAgents(),
        onTyping: (agentId, isTyping) => {
          if (isTyping) showTyping(agentId);
          else hideTyping(agentId);
        },
        setConnected,
      });
    }

      const dot = document.getElementById('status-dot');
      const label = document.getElementById('status-label');
      dot.style.background = v ? 'var(--green)' : 'var(--red)';
      dot.style.boxShadow = v ? '0 0 8px var(--green)' : '0 0 8px var(--red)';
      label.textContent = v ? 'Connected' : 'Reconnecting…';
      return window.AcbSSE.setConnectedUI(v);
    }

    // ── Copy message content to clipboard ────────────────────────────────────
    window.AcbCopyMsg = function(btn) {
      const bubble = btn.closest('.msg-col')?.querySelector('.bubble-v2');
      if (!bubble) return;
      const text = bubble.innerText || bubble.textContent || '';
      navigator.clipboard.writeText(text.trim()).then(() => {
        // Swap icon to checkmark briefly
        const svg = btn.querySelector('svg');
        if (!svg) return;
        const original = svg.innerHTML;
        svg.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
        btn.classList.add('msg-copy-btn--ok');
        setTimeout(() => {
          svg.innerHTML = original;
          btn.classList.remove('msg-copy-btn--ok');
        }, 1500);
      }).catch(() => {});
    };

    function appendBubble(m) {
      const box = document.getElementById('messages');

      // ---- Deduplication check (also check sys-prompt-area for seq=0) --------
      const seq = String(m.seq);
      const sysPromptArea = document.getElementById('sys-prompt-area');
      const existingMsg = box.querySelector(`[data-seq="${seq}"]`) ||
        (sysPromptArea && sysPromptArea.querySelector(`[data-seq="${seq}"]`));
      if (existingMsg) {
        console.warn(`[Deduplicate] Message seq ${seq} already exists in DOM, skipping.`);
        return;
      }

      const parseMetadata = (raw) => {
        if (!raw) return null;
        if (typeof raw === 'object') return raw;
        if (typeof raw !== 'string') return null;
        try {
          return JSON.parse(raw);
        } catch {
          return null;
        }
      };

      // ---- System event (centered pill / action card) or system prompt (collapsable bubble) ---------------------
      if (m.role === 'system' && m.author === 'system') {
        const metaObj = parseMetadata(m.metadata);

        // Frontend fallback: still render legacy human-decision admin switch cards
        // if old messages exist in history.
        if (metaObj && (
          metaObj.ui_type === 'admin_switch_confirmation_required'
          || metaObj.ui_type === 'admin_takeover_confirmation_required'
        )) {
          const card = document.createElement('acb-admin-switch-card');
          if (typeof card.setData === 'function') {
            card.setData({
              message: m,
              metadata: metaObj,
              threadId: metaObj.thread_id || activeThreadId,
              api,
            });
          }
          box.appendChild(card);
          return;
        }

        if (metaObj && metaObj.ui_type === 'admin_coordination_timeout_notice') {
          const wrapper = document.createElement('div');
          wrapper.className = 'msg-sys-admin-timeout';
          wrapper.setAttribute('data-seq', String(m.seq));

          const card = document.createElement('div');
          card.className = 'msg-sys-admin-timeout-card';

          const main = document.createElement('div');
          main.className = 'msg-sys-admin-timeout-main';
          const sentAt = fmtTime(m.created_at);
          main.textContent = sentAt ? `${sentAt}  ${m.content}` : m.content;
          if (m.created_at) {
            main.title = `sent at ${m.created_at}`;
          }

          const note = document.createElement('div');
          note.className = 'msg-sys-admin-timeout-note-inline';
          note.innerHTML = `
            <span class="msg-sys-admin-timeout-note-icon" aria-hidden="true">i</span>
            <span class="msg-sys-admin-timeout-note-text">This notice is visible only to human participants. Agents cannot read or receive this message.</span>
          `;

          card.appendChild(main);
          card.appendChild(note);
          wrapper.appendChild(card);
          box.appendChild(wrapper);
          return;
        }

        // System prompt (seq=0): collapsable bubble with Markdown rendering
        if (m.seq === 0) {
          const wrapper = document.createElement('div');
          wrapper.className = 'msg-sys-prompt';
          wrapper.setAttribute('data-seq', '0');

          const promptHeader = document.createElement('button');
          promptHeader.type = 'button';
          promptHeader.className = 'msg-sys-prompt-header';
          promptHeader.setAttribute('aria-expanded', 'true');
          promptHeader.classList.add('is-expanded');
          promptHeader.innerHTML = `<span class="msg-sys-prompt-label">Thread Instructions (system)</span><span class="msg-sys-prompt-chevron">&#9650;</span>`;

          const promptBody = document.createElement('div');
          promptBody.className = 'msg-sys-prompt-body bubble-v2';
          renderMessageContent(promptBody, m.content, null);

          promptHeader.addEventListener('click', () => {
            const expanded = promptHeader.getAttribute('aria-expanded') === 'true';
            promptHeader.setAttribute('aria-expanded', String(!expanded));
            promptHeader.classList.toggle('is-expanded', !expanded);
            promptBody.classList.toggle('collapsed', expanded);
            promptHeader.querySelector('.msg-sys-prompt-chevron').innerHTML = !expanded ? '&#9650;' : '&#9660;';
            promptHeader.querySelector('.msg-sys-prompt-label').textContent = !expanded
              ? 'Thread Instructions (system)'
              : 'Thread Instructions (system) — click to expand';
          });

          wrapper.appendChild(promptHeader);
          wrapper.appendChild(promptBody);

          // Copy button inside promptBody (bottom-right), not in the header
          const promptCopyBtn = document.createElement('button');
          promptCopyBtn.type = 'button';
          promptCopyBtn.className = 'msg-sys-prompt-copy-btn';
          promptCopyBtn.title = 'Copy system prompt';
          promptCopyBtn.setAttribute('aria-label', 'Copy system prompt');
          promptCopyBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
          promptCopyBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const text = (promptBody.innerText || promptBody.textContent || '').trim();
            navigator.clipboard.writeText(text).then(() => {
              const svg = promptCopyBtn.querySelector('svg');
              if (!svg) return;
              const original = svg.innerHTML;
              svg.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
              promptCopyBtn.classList.add('msg-copy-btn--ok');
              setTimeout(() => {
                svg.innerHTML = original;
                promptCopyBtn.classList.remove('msg-copy-btn--ok');
              }, 1500);
            }).catch(() => {});
          });
          promptBody.appendChild(promptCopyBtn);

          // UI-07: system prompt goes into its own full-width area (above chat-body)
          const sysArea = document.getElementById('sys-prompt-area') || box;
          sysArea.innerHTML = '';
          sysArea.appendChild(wrapper);
          return;
        }

        // Other system events: centered pill
        const pill = document.createElement('div');
        pill.className = 'msg-sys-event';
        const sentAt = fmtTime(m.created_at);
        pill.textContent = sentAt ? `${sentAt}  ${m.content}` : m.content;
        if (m.created_at) {
          pill.title = `sent at ${m.created_at}`;
        }
        box.appendChild(pill);
        return;
      }

      const authorLabel = String(m.author_name ?? m.author ?? '').trim() || 'unknown';
      const isSystem = String(m.role ?? '').toLowerCase() === 'system' || authorLabel.toLowerCase() === 'system';
      const isHuman = authorLabel.toLowerCase() === 'human';
      const authorKey = isHuman ? 'human' : (isSystem ? 'system' : String(m.author_id ?? authorLabel));
      const color = authorColor(authorKey);
      const avatarEmoji = String(m.author_emoji || '').trim()
        || String(currentAgents?.find((a) => a.id === String(m.author_id ?? ''))?.emoji || '').trim()
        || (isHuman ? '👤' : (isSystem ? '⚙️' : '🤖'));
      const bgAlpha = `${color}22`;  // ~13% alpha tint for avatar bg
      const isAgentMessage = !isHuman && !isSystem;
      const sentAtLabel = fmtTime(m.created_at);

      const row = document.createElement('div');
      row.className = `msg-row ${isHuman ? 'msg-row-right' : 'msg-row-left'}`;
      row.setAttribute('data-author-id', String(m.author_id ?? authorLabel));
      row.setAttribute('data-seq', String(m.seq));

      // Check if this message has mentions (look in metadata if string/object)
      let metaObj = parseMetadata(m.metadata);
      const hasMentions = metaObj && metaObj.mentions && Array.isArray(metaObj.mentions) && metaObj.mentions.length > 0;
      if (hasMentions) {
        row.classList.add('message-has-mentions');
      }

      // Build metadata badges (handoff_target, stop_reason)
      let handoffBadgeHtml = '';
      if (metaObj) {
        if (metaObj.handoff_target) {
          handoffBadgeHtml = `<span class="handoff-badge" title="Handoff to: ${esc(metaObj.handoff_target)}">&#8594; ${esc(metaObj.handoff_target)}</span>`;
        }
        if (metaObj.stop_reason) {
          const reasonClass = `stop-tag stop-tag-${esc(metaObj.stop_reason)}`;
          handoffBadgeHtml += `<span class="${reasonClass}" title="Stop reason">${esc(metaObj.stop_reason)}</span>`;
        }
      }

      // Priority badge (UP-16)
      let priorityBadgeHtml = '';
      if (m.priority === 'urgent') {
        priorityBadgeHtml = '<span class="msg-priority-badge msg-priority-urgent" title="Urgent message">URGENT</span>';
      } else if (m.priority === 'system') {
        priorityBadgeHtml = '<span class="msg-priority-badge msg-priority-system" title="System message">SYSTEM</span>';
      }

      // Reply-to quote (UP-14)
      const replyQuoteHtml = m.reply_to_msg_id
        ? `<div class="msg-reply-quote" title="In reply to message ${esc(m.reply_to_msg_id)}">&#8617; In reply to: <em>${esc(m.reply_to_msg_id.slice(0, 8))}…</em></div>`
        : '';

      row.innerHTML = `
      <div class="msg-avatar" style="background:${bgAlpha};color:${color};border:1px solid ${color}44">${avatarEmoji}</div>
      <div class="msg-col">
        <div class="msg-header">
          <span class="msg-author-label" style="color:${color}">${esc(authorLabel)}</span>
          <span class="msg-time-label">seq ${m.seq} ${fmtTime(m.created_at)}</span>
          ${priorityBadgeHtml}
          ${handoffBadgeHtml}
          <button class="msg-copy-btn" title="Copy message" aria-label="Copy message content" onclick="window.AcbCopyMsg(this)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
        ${replyQuoteHtml}
        <div class="bubble-v2" style="border-color:${color}55;${isHuman ? 'border-right-color' : 'border-left-color'}:${color}"></div>
        ${isAgentMessage ? '<acb-message-tail-meta></acb-message-tail-meta>' : ''}
        <div class="msg-reactions"></div>
      </div>`;

      const tailMetaEl = row.querySelector('acb-message-tail-meta');
      if (tailMetaEl && typeof tailMetaEl.setData === 'function') {
        tailMetaEl.setData({
          visible: true,
          emoji: avatarEmoji,
          name: authorLabel,
          timeLabel: sentAtLabel,
        });
      }

      const bubbleEl = row.querySelector('.bubble-v2');
      if (bubbleEl) {
        renderMessageContent(bubbleEl, m.content, m.metadata);

        // Render images if any
        let images = null;
        console.log(`[Bubble] Message metadata:`, m.metadata, `Type: ${typeof m.metadata}`);
        if (m.metadata) {
          // Parse metadata if it's a string
          if (typeof m.metadata === 'string') {
            try {
              const meta = JSON.parse(m.metadata);
              images = meta.images;
              console.log(`[Bubble] Parsed metadata as string, images:`, images);
            } catch (e) {
              console.error(`[Bubble] Failed to parse metadata JSON:`, e);
            }
          } else if (typeof m.metadata === 'object') {
            images = m.metadata.images;
            console.log(`[Bubble] Got metadata as object, images:`, images);
          }
        } else {
          console.log(`[Bubble] No metadata in message`);
        }

        if (images && Array.isArray(images) && images.length > 0) {
          console.log(`[Bubble] Rendering ${images.length} images`);
          const imgContainer = document.createElement('div');
          imgContainer.style.cssText = 'display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px;';
          images.forEach(img => {
            const imgEl = document.createElement('img');
            imgEl.src = img.url;
            imgEl.title = img.name || 'Uploaded image';
            imgEl.style.cssText = 'width: min(520px, 80vw); max-width: 100%; max-height: 70vh; border-radius: 8px; object-fit: contain; cursor: zoom-in; background: rgba(0,0,0,0.05);';
            imgEl.onclick = () => window.open(img.url, '_blank');
            imgContainer.appendChild(imgEl);
            console.log(`[Bubble] Added image: ${img.url}`);
          });
          bubbleEl.appendChild(imgContainer);
        } else {
          console.log(`[Bubble] No images to render`);
        }
      }

      // Render reactions pills (UP-13)
      if (m.reactions && m.reactions.length > 0) {
        const reactionsEl = row.querySelector('.msg-reactions');
        if (reactionsEl) {
          // Group by reaction label
          const groups = {};
          for (const r of m.reactions) {
            if (!groups[r.reaction]) groups[r.reaction] = [];
            groups[r.reaction].push(r.agent_name || r.agent_id || '?');
          }
          for (const [label, agents] of Object.entries(groups)) {
            const pill = document.createElement('span');
            pill.className = 'reaction-pill';
            pill.title = agents.join(', ');
            pill.textContent = agents.length > 1 ? `${label} ×${agents.length}` : label;
            reactionsEl.appendChild(pill);
          }
        }
      }

      if (!isHuman && !isSystem) {
        const avatarEl = row.querySelector('.msg-avatar');
        if (avatarEl) {
          avatarEl.classList.add('msg-avatar-interactive');
          // Get full agent details from current agents list
          const authorId = String(m.author_id ?? authorLabel);
          const agentData = currentAgents?.find(a => a.id === authorId) || {
            id: authorId,
            agent_id: authorId,
            name: authorLabel,
            display_name: authorLabel,
            ide: 'Unknown',
            model: 'Unknown',
            token: ''
          };
          bindAgentTooltipEvents(avatarEl, agentData);
        }
      }

      box.appendChild(row);
      if (window.AcbNavSidebar) window.AcbNavSidebar.onNewMessage();

      // UI-07: collapse system prompt on first real message
      const sysArea = document.getElementById('sys-prompt-area');
      if (sysArea) {
        const header = sysArea.querySelector('.msg-sys-prompt-header');
        const body = sysArea.querySelector('.msg-sys-prompt-body');
        if (header && body && header.getAttribute('aria-expanded') === 'true') {
          header.setAttribute('aria-expanded', 'false');
          header.classList.remove('is-expanded');
          body.classList.add('collapsed');
          const chevron = header.querySelector('.msg-sys-prompt-chevron');
          const label = header.querySelector('.msg-sys-prompt-label');
          if (chevron) chevron.innerHTML = '&#9660;';
          if (label) label.textContent = 'Thread Instructions (system) — click to expand';
        }
      }
    }
    // ---- Typing indicator ----------------------------------------------------------------------------------------------------------
    function showTyping(agentId) {
      const box = document.getElementById('messages');
      let el = document.getElementById(`typing-${agentId}`);
      if (!el) {
        const color = authorColor(agentId);
        const agentEmoji = String(currentAgents?.find((a) => a.id === agentId)?.emoji || '').trim();
        const avatarEmoji = agentEmoji || '🤖';
        const row = document.createElement('div');
        row.className = 'msg-row msg-row-left';
        row.id = `typing-${agentId}`;
        row.innerHTML = `
          <div class="msg-avatar" style="background:${color}22;color:${color};border:1px solid ${color}44">${avatarEmoji}</div>
          <div class="msg-col">
            <div class="msg-header">
              <span class="msg-author-label" style="color:${color}">${esc(agentId)}</span>
              <span class="msg-time-label">typing…</span>
            </div>
            <div class="typing-bubble"><span></span><span></span><span></span></div>
          </div>`;
        box.appendChild(row);
        scrollBottom(true);
      }
      clearTimeout(typingTimers[agentId]);
      typingTimers[agentId] = setTimeout(() => hideTyping(agentId), 8000);
    }

    function hideTyping(agentId) {
      const el = document.getElementById(`typing-${agentId}`);
      if (el) el.remove();
    }

    // ==============================================================================================
    // Compose
    // ==============================================================================================
    async function sendMessage() {
      return window.AcbChat.sendMessage({
        getActiveThreadId: () => activeThreadId,
        getThreadSyncContext,
        setThreadSyncContext: (threadId, syncContext) => {
          if (!threadId) return;
          if (syncContext && typeof syncContext.current_seq === 'number' && syncContext.reply_token) {
            threadSyncContexts.set(threadId, syncContext);
            return;
          }
          threadSyncContexts.delete(threadId);
        },
        updateOnlinePresence,
        api,
        setLastSeq: (fn) => { lastSeq = (typeof fn === 'function' ? fn(lastSeq) : fn); },
        appendBubble,
        scrollBottom,
      });
    }

    function handleKey(e) {
      return window.AcbChat.handleKey(e, sendMessage);
    }

    function autoResize(el) {
      // Placeholder for compatibility
    }

    // ==============================================================================================
    // Agents
    // ==============================================================================================
    async function refreshAgents() {
      // Delegate to window.AcbAgents.updateStatusBar() for consistency
      await window.AcbAgents.updateStatusBar({
        api,
        setCurrentAgents: (agents) => { currentAgents = agents; },
        getActiveThreadId: () => activeThreadId,
        getAgentState,
        getStateEmoji,
        getOfflineTime,
        isOfflineMoreThanHour,
        getCompressedOfflineChar,
        escapeHtml,
        bindAgentTooltipEvents,
      });
    }

    // ==============================================================================================
    // Helper: Escape HTML
    // ==============================================================================================
    function escapeHtml(t) {
      return window.AcbUtils.escapeHtml(t);
    }

    function getAgentState(agent) {
      return window.AcbAgentStatus.getAgentState(agent);
    }

    function getOfflineTime(agent) {
      return window.AcbAgentStatus.getOfflineTime(agent);
    }

    function isOfflineMoreThanHour(agent) {
      return window.AcbAgentStatus.isOfflineMoreThanHour(agent);
    }

    function getCompressedOfflineChar(offlineTimeStr) {
      return window.AcbAgentStatus.getCompressedOfflineChar(offlineTimeStr);
    }


    function getStateEmoji(state) {
      const map = { 'Offline': '⚫', 'Waiting': '⏳', 'Active': '🟢' };
      return map[state] || 'Γ¥ô';
    }

    // ==============================================================================================
    // Sidebar tabs
    // ==============================================================================================
    function switchTab(tab) {
      // Only threads tab is available now
      if (tab !== 'threads') return;
      // Control filter visibility
      const filterWrap = document.getElementById('thread-filter-wrap');
      if (filterWrap) {
        filterWrap.style.display = '';
      }
    }

    // ==============================================================================================
    // Modal
    // ==============================================================================================
    function openModal() {
      return window.AcbModals.openThreadModal(api);
    }

    function closeModal(e) {
      return window.AcbModals.closeThreadModal(e);
    }

    async function submitModal() {
      return window.AcbModals.submitThreadModal({ api, refreshThreads, selectThread });
    }

    // ==============================================================================================
    // Extras: thread state & close (REST shims)
    // ==============================================================================================
    // Extend the REST API with two extra POST endpoints that main.py may serve later.
    // If they 404, we silently ignore ΓÇö the MCP tool path is the canonical way.

    // ==============================================================================================
    // Utilities
    // ==============================================================================================
    function esc(s) {
      return window.AcbUtils.esc(s);
    }

    // renderMarkdown and inlineMd functions are now in shared-message-renderer.js module
    // Access them via window.AcbMessageRenderer.renderMarkdown() and window.AcbMessageRenderer.inlineMd()

    function scrollBottom(smooth = false) {
      const box = document.getElementById('messages-scroll');
      if (!box) return;

      // Use setTimeout to ensure DOM updates and layout are fully applied
      // before attempting to scroll to the bottom.
      setTimeout(() => {
        // Force synchronous layout so scrollHeight is accurate
        void box.offsetHeight;
        if (smooth) {
          console.log('Scrolling to bottom', { top: box.scrollHeight, behavior: 'smooth' });
          box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        } else {
          box.scrollTop = box.scrollHeight;
        }
      }, 50);
    }

    function timeAgo(iso) {
      return window.AcbUtils.timeAgo(iso);
    }

    // ==============================================================================================
    // Settings Settings
    // ==============================================================================================
    async function openSettingsModal() {
      return window.AcbModals.openSettingsModal(api);
    }

    function closeSettingsModal(e) {
      return window.AcbModals.closeSettingsModal(e);
    }

    async function submitSettings() {
      return window.AcbModals.submitSettings(api);
    }
  </script>
