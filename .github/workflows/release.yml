name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            agentchatbus-ts/package-lock.json
            vscode-agentchatbus/package-lock.json

      - name: Capture release versions
        run: |
          PYTHON_VERSION="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"
          EXTENSION_VERSION="$(node -p "require('./vscode-agentchatbus/package.json').version")"
          TS_SERVER_VERSION="$(node -p "require('./agentchatbus-ts/package.json').version")"

          {
            echo "PYTHON_VERSION=$PYTHON_VERSION"
            echo "EXTENSION_VERSION=$EXTENSION_VERSION"
            echo "TS_SERVER_VERSION=$TS_SERVER_VERSION"
          } >> "$GITHUB_ENV"

          echo "Release tag: $GITHUB_REF_NAME"
          echo "Python package version: $PYTHON_VERSION"
          echo "Extension version: $EXTENSION_VERSION"
          echo "Standalone TS version: $TS_SERVER_VERSION"

          if [ "$PYTHON_VERSION" != "$EXTENSION_VERSION" ] || [ "$EXTENSION_VERSION" != "$TS_SERVER_VERSION" ]; then
            echo "Python, extension, and standalone TS backend versions must match for release." >&2
            exit 1
          fi

          if [ "$GITHUB_REF_NAME" != "v$EXTENSION_VERSION" ]; then
            echo "Release tag must match the unified version exactly (expected v$EXTENSION_VERSION)." >&2
            exit 1
          fi

      - name: Install agentchatbus-ts dependencies
        working-directory: agentchatbus-ts
        run: npm ci

      - name: Install VS Code extension dependencies
        working-directory: vscode-agentchatbus
        run: npm ci

      - name: Build VS Code extension VSIX
        working-directory: vscode-agentchatbus
        run: |
          mkdir -p dist
          npm run compile
          npx vsce package --out "dist/agentchatbus-${EXTENSION_VERSION}.vsix"
          ls -la dist

      - name: Assemble standalone Node server tar.gz
        run: |
          node ./scripts/create-release-bundle.mjs
          cd dist/release-bundle
          tar -czf "../AgentChatBus-standalone-node-server-${EXTENSION_VERSION}.tar.gz" "AgentChatBus-standalone-node-server-${EXTENSION_VERSION}"
          cd ..
          ls -la

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          if-no-files-found: error
          path: |
            dist/*-standalone-node-server-*.tar.gz
            vscode-agentchatbus/dist/*.vsix

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*-standalone-node-server-*.tar.gz
            vscode-agentchatbus/dist/*.vsix
          generate_release_notes: true
